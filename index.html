<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sport in Victoria — AusPlay 2025</title>

  <script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-lite@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #1a2e1a;
      position: relative;
      color: #e2e8f0;
      font-family: sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    h1 { font-size: 1.8rem; margin-bottom: 8px; color: #ffffff; text-shadow: 0 2px 18px rgba(0,0,0,0.9), 0 0 40px rgba(100,220,100,0.3); letter-spacing: 0.02em; }
    p.subtitle { font-size: 0.95rem; color: #bbf7d0; margin-bottom: 36px; text-shadow: 0 1px 10px rgba(0,0,0,0.9); }

    #charts { display: flex; flex-direction: column; align-items: center; width: 100%; }

    .section { width: 100%; max-width: 960px; margin-bottom: 44px; }

    .section-title {
      font-size: 1.2rem; color: #86efac;
      margin-bottom: 4px; padding-bottom: 6px;
      border-bottom: 1px solid rgba(74,180,74,0.3);
      text-shadow: 0 1px 8px rgba(0,0,0,0.8);
    }

    .section-note { font-size: 0.85rem; color: #d1fae5; text-shadow: 0 1px 6px rgba(0,0,0,0.9); margin: 8px 0 0; }

    /* Charts in a section, side by side, wrapping into more rows as needed */
    .row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 24px;
      margin-top: 16px;
    }

    .card {
      background: rgba(5, 14, 5, 0.83); border: 1px solid rgba(74, 180, 74, 0.22);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius: 14px; padding: 16px 16px 14px;
      display: flex; flex-direction: column;
      min-width: 0;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 0 0 1px rgba(100,200,100,0.08);
    }
    .card.wide { grid-column: 1 / -1; }   /* full-width charts like the map */

    .card .chart { width: 100%; min-width: 0; }

    .card .desc {
      margin-top: 10px; font-size: 0.82rem; line-height: 1.45;
      color: #e2f5e2;
      text-shadow: 0 1px 6px rgba(0,0,0,0.9);
      max-width: 100%;
    }

    .play-btn {
      margin-top: 10px; align-self: flex-start;
      background: rgba(20,80,20,0.7); color: #bbf7d0; border: 1px solid rgba(74,180,74,0.4);
      border-radius: 8px; padding: 6px 14px; font-size: 0.82rem; cursor: pointer;
    }
    .play-btn:hover { background: rgba(30,110,30,0.8); }

    /* Hide the live numeric value Vega prints next to the range slider */
    .vega-bind input[type="range"] + span { display: none; }

    @media (max-width: 720px) {
      .row { grid-template-columns: 1fr; }
    }

    const DESCRIPTIONS = {
      "Participation Rate & Estimated Participants by Age":
        "Participation peaks among working-age adults (around 91% at 25–34 and 45–54) and dips to 79% for those 65+ — though that older group is still a large slice of total participants.",
      "Gender Split of Participants by Age Group":
        "The donut steps through each age group, showing male vs female participant numbers. Younger groups skew slightly male; from mid-life the balance tips female, most clearly at 65+.",
      "Participation Rate by Household Income":
        "Participation rises steadily with household income, from 76.7% under $40k to 95% above $200k.",
      "Participation Heatmap (Age × Gender)":
        "Participation stays high and fairly even across age and gender, with the clearest drop among adults 65+, especially women (77.8%).",
      "Adults Reaching Each Frequency Threshold":
        "Reach falls sharply as the bar is raised — about 88% take part at least yearly, but only ~36% manage five or more sessions a week.",
      "Top Activities by Participation Rate":
        "Recreational walking (51.6%) and fitness/gym (35%) dominate, well ahead of running, bushwalking and swimming.",
      "Activity Type Mix by Age Group":
        "Younger people lean toward sport (often combined with other activity); from middle age onward, non-sport activity becomes the dominant mode.",
      "Top Motivations for Participation":
        "Physical health/fitness (66%) and fun/enjoyment (58%) are the top drivers, ahead of weight management and being outdoors.",
      "Top Barriers to Participation by Gender":
        "Poor health/injury and increasing age are the leading barriers, and most are reported more often by women — the exception being 'too lazy', cited more by men.",
      "Where Adults are Active":
        "Public spaces are where most adults are active (63%), followed by gyms/leisure centres and the home; formal clubs play a smaller role.",
      "Victoria — Participation Rate by Remoteness Area":
        "Participation is strongest in Melbourne (88%) and steps down across regional centres, reaching its lowest in the far north-west at Mildura (76%)."
    };

    function titleOf(t) { return (t && typeof t === 'object') ? t.text : t; }

    /* Flatten every leaf chart out of the concatenated spec. */
    function collectCharts(node, out) {
      if (Array.isArray(node)) { node.forEach(n => collectCharts(n, out)); return; }
      if (node && typeof node === 'object') {
        if ('title' in node && ('mark' in node || 'layer' in node)) { out.push(node); return; }
        if (node.vconcat) collectCharts(node.vconcat, out);
        if (node.hconcat) collectCharts(node.hconcat, out);
      }
    }

    async function build() {
      const root = await fetch('code.json').then(r => r.json());
      const container = document.getElementById('charts');

      // Look up every chart by its title
      const all = [];
      collectCharts(root, all);
      const byTitle = new Map(all.map(c => [titleOf(c.title), c]));
      const used = new Set();

      const pending = [];
      let idx = 0;

      function makeCard(chart, row) {
        const titleText = titleOf(chart.title);
        const isMap = /victoria/i.test(titleText || '');

        const card = document.createElement('div');
        card.className = 'card' + (isMap ? ' wide' : '');

        const vis = document.createElement('div');
        vis.className = 'chart';
        vis.id = 'vis-' + idx;

        const desc = document.createElement('p');
        desc.className = 'desc';
        desc.textContent = DESCRIPTIONS[titleText] || '';

        card.appendChild(vis);
        if (desc.textContent) card.appendChild(desc);
        row.appendChild(card);

        const spec = Object.assign(
          {
            "$schema": "https://vega.github.io/schema/vega-lite/v5.json",
            "background": "transparent",
            "config": root.config
          },
          chart
        );
        spec.width = "container";
        if (!spec.autosize) spec.autosize = { type: "fit", contains: "padding" };
        if (root.resolve && !spec.resolve) spec.resolve = root.resolve;

        pending.push(['#vis-' + idx, spec]);
        idx++;
      }

      function renderSection(meta, chartObjs, number) {
        if (!chartObjs.length) return;
        const section = document.createElement('section');
        section.className = 'section';

        const h2 = document.createElement('h2');
        h2.className = 'section-title';
        h2.textContent = (number ? 'Section ' + number + ': ' : '') + (meta.title || '');
        section.appendChild(h2);

        if (meta.note) {
          const note = document.createElement('p');
          note.className = 'section-note';
          note.textContent = meta.note;
          section.appendChild(note);
        }

        const row = document.createElement('div');
        row.className = 'row';
        chartObjs.forEach(c => makeCard(c, row));
        section.appendChild(row);
        container.appendChild(section);
      }

      // Render configured sections in order
      SECTIONS.forEach((meta, i) => {
        const objs = (meta.charts || []).map(t => byTitle.get(t)).filter(Boolean);
        objs.forEach(o => used.add(o));
        renderSection(meta, objs, i + 1);
      });

      // Any charts not assigned to a section still get shown
      const leftovers = all.filter(c => !used.has(c));
      if (leftovers.length) renderSection({ title: "More" }, leftovers);

      // Embed once the DOM (and therefore each container's width) exists.
      // If a chart exposes an "ageStep" slider param, auto-advance it (time animation)
      // and give it a Play/Pause button.
      pending.forEach(([sel, spec]) => {
        vegaEmbed(sel, spec, { actions: false }).then(res => {
          const p = (spec.params || []).find(x => x.name === 'ageStep');
          if (p && res && res.view) {
            const steps = 7;            // number of age groups
            let i = p.value || 0;
            let timer = null;

            const tick = () => { i = (i + 1) % steps; res.view.signal('ageStep', i).run(); };

            const btn = document.createElement('button');
            btn.className = 'play-btn';

            const start = () => { if (!timer) timer = setInterval(tick, 2000); btn.textContent = '\u23F8 Pause'; };
            const stop  = () => { clearInterval(timer); timer = null; btn.textContent = '\u25B6 Play'; };
            btn.addEventListener('click', () => (timer ? stop() : start()));

            // keep "i" in sync if the user scrubs the slider
            res.view.addSignalListener('ageStep', (_, v) => { i = v; });

            // place the button just under the chart
            const visEl = document.querySelector(sel);
            if (visEl) visEl.insertAdjacentElement('afterend', btn);

            start();                    // begin playing automatically
          }
        }).catch(console.error);
      });
    }

    build().catch(console.error);
  </script>

</body>
</html>
